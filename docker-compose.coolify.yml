services:
  # MongoDB Database
  mongo:
    image: mongo:latest
    container_name: opensign-mongo
    volumes:
      - mongo-data:/data/db
    networks:
      - opensign-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenSign Backend (Parse Server)
  server:
    image: opensign/opensignserver:main
    container_name: opensign-server
    volumes:
      - opensign-files:/usr/src/app/files
    environment:
      - NODE_ENV=production
      - SERVER_URL=${HOST_URL:-http://localhost}/api/app
      - PUBLIC_URL=${HOST_URL:-http://localhost}
      - APP_ID=${APP_ID:-opensign123456}
      - MASTER_KEY=${MASTER_KEY:-change-this-to-secure-key}
      - MONGODB_URI=mongodb://mongo:27017/opensign
      - PARSE_MOUNT=/app
      - DO_SPACE=${DO_SPACE:-}
      - DO_ENDPOINT=${DO_ENDPOINT:-}
      - DO_ACCESS_KEY_ID=${DO_ACCESS_KEY_ID:-}
      - DO_SECRET_ACCESS_KEY=${DO_SECRET_ACCESS_KEY:-}
      - DO_REGION=${DO_REGION:-us-west}
      - MAILGUN_API_KEY=${MAILGUN_API_KEY:-}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN:-}
      - MAILGUN_SENDER=${MAILGUN_SENDER:-}
      - SMTP_ENABLE=${SMTP_ENABLE:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER_EMAIL=${SMTP_USER_EMAIL:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - PFX_BASE64=${PFX_BASE64:-}
      - PASS_PHRASE=${PASS_PHRASE:-}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - opensign-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/app/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # OpenSign Frontend (React)
  client:
    image: opensign/opensign:main
    container_name: opensign-client
    environment:
      - PUBLIC_URL=${HOST_URL:-http://localhost}
      - REACT_APP_SERVERURL=${HOST_URL:-http://localhost}/api/app
      - REACT_APP_APPID=${APP_ID:-opensign123456}
      - GENERATE_SOURCEMAP=false
      - REACT_APP_GTM=${REACT_APP_GTM:-}
    depends_on:
      server:
        condition: service_healthy
    networks:
      - opensign-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  opensign-network:
    driver: bridge

volumes:
  mongo-data:
  opensign-files:
