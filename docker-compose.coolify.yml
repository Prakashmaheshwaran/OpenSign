services:
  mongo:
    image: mongo:latest
    container_name: opensign-mongo
    volumes:
      - mongo-data:/data/db
    networks:
      - opensign-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: opensign/opensignserver:main
    container_name: opensign-server
    volumes:
      - opensign-files:/usr/src/app/files
    environment:
      - NODE_ENV=production
      - SERVER_URL=${HOST_URL}/api/app
      - PUBLIC_URL=${HOST_URL}
      - APP_ID=${APP_ID:-opensign123456}
      - MASTER_KEY=${MASTER_KEY:-change-this-key}
      - MONGODB_URI=mongodb://mongo:27017/opensign
      - PARSE_MOUNT=/app
      - USE_LOCAL=TRUE
      - SMTP_ENABLE=${SMTP_ENABLE:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER_EMAIL=${SMTP_USER_EMAIL:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - PFX_BASE64=${PFX_BASE64:-}
      - PASS_PHRASE=${PASS_PHRASE:-}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - opensign-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/app/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  client:
    image: opensign/opensign:main
    container_name: opensign-client
    environment:
      - PUBLIC_URL=${HOST_URL}
      - REACT_APP_SERVERURL=${HOST_URL}/api/app
      - REACT_APP_APPID=${APP_ID:-opensign123456}
      - GENERATE_SOURCEMAP=false
      - REACT_APP_GTM=${REACT_APP_GTM:-}
    depends_on:
      server:
        condition: service_healthy
    networks:
      - opensign-network

  caddy:
    image: caddy:latest
    container_name: opensign-caddy
    volumes:
      - ./Caddyfile.coolify:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client
    networks:
      - opensign-network

networks:
  opensign-network:
    driver: bridge

volumes:
  mongo-data:
  opensign-files:
  caddy_data:
  caddy_config:
